name: Static checks

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Shell, C, Markdown, systemd
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -name '*azure-cli*' -o -name '*microsoft*' \) -delete
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt cppcheck
          sudo npm install --global markdownlint-cli2

      - name: Prepare systemd verify stub
        run: |
          sudo useradd -r -M michal || true
          sudo install -d -m 755 /home/michal/bin
          printf '%s\n' '#!/bin/sh' 'exit 0' | sudo tee /home/michal/bin/epd_290_bw_status >/dev/null
          sudo chmod 755 /home/michal/bin/epd_290_bw_status

      - name: Run checks
        env:
          CHECK_SYSTEMD_FORCE: "1"
        run: ./scripts/check.sh
